name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        working-directory: app
        run: npm ci

      - name: Typecheck
        working-directory: app
        run: npm run typecheck

      - name: Lint
        working-directory: app
        run: npm run lint

      - name: Build
        working-directory: app
        run: npm run build
        env:
          VITE_BUILD_HASH: ${{ github.sha }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Bundle size check (< 256KB gzipped)
        working-directory: app
        run: |
          SIZE=$(gzip -c dist/assets/*.js | wc -c)
          echo "Bundle size: ${SIZE} bytes gzipped"
          test "$SIZE" -lt 256000

      - name: No service_role in bundle
        working-directory: app
        run: grep -r "service_role" dist || echo OK

      - name: Install Playwright
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        working-directory: app
        run: npm run test
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
